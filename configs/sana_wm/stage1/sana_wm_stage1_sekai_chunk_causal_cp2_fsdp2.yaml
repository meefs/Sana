task: df
data:
  hf_dataset_repo: Efficient-Large-Model/SANA-WM-example-training-dataset
  hf_dataset_revision: 4d965e94b9ea11b9c5ba085251ffa7a0345e006f
  hf_dataset_local_dir: .
  hf_dataset_allow_patterns: [data/**]
  data_dir:
    sekai_game: data/sekai_game_train_961frames_16fps_ovl640
  external_caption_suffixes: [_LongSceneStaticCaption-Qwen3-VL-30B-A3B-Instruct]
  caption_proportion:
    sekai_game:
      _LongSceneStaticCaption-Qwen3-VL-30B-A3B-Instruct: 100
  data_repeat:
    sekai_game: 16
  external_data_filter:
    sekai_game:
      _vmafmotion: {min: 0.5, max: 50}
      _unimatch: {min: 3.0, max: 80}
      _dover: {min: 0.25, max: 1.0}
      _vlm_entity_filter: {min: 0, max: 10}
      _vlm_quality_filter: {min: 0.5, max: 1.5}
  type: SanaWMZipLatentDataset
  image_size: 720
  aspect_ratio_type: ASPECT_RATIO_VIDEO_720_MS_DIV32
  transform: default_train_video
  load_text_feat: false
  load_vae_feat: true
  vae_cache_dir: data/vae_cache/LTX2VAE_diffusers_704x1280/sekai_game_train_961frames_16fps_ovl640
  num_frames: 961
  sort_dataset: false
  shuffle_dataset: true
  shuffle_mode: item
  return_raymap: false
  use_plucker: false
  vae_ratio: [8, 32]
  cam_sample_strategy: last
  use_relative_pose: false
  normalize_poses: false
  return_delta_actions: false
  return_chunk_plucker: true
model:
  model: SanaMSVideoCamCtrl_1600M_P1_D20
  image_size: 720
  mixed_precision: bf16
  fp32_attention: true
  load_from: hf://Efficient-Large-Model/SANA-WM_chunk_causal/dit/sana_wm_chunk_causal_1600m_720p.safetensors
  aspect_ratio_type: ASPECT_RATIO_VIDEO_720_MS_DIV32
  multi_scale: true
  camctrl_type: ChunkCausalGDNUCPESinglePathLiteLABothTriton
  attn_type: ChunkCausalGDNTriton
  softmax_every_n: 4
  linear_head_dim: 112
  conv_kernel_size: 4
  k_conv_only: true
  ffn_type: ChunkGLUMBConvTemp
  t_kernel_size: 3
  mlp_acts: [silu, silu, null]
  mlp_ratio: 3.0
  use_pe: true
  pos_embed_type: wan_rope
  qk_norm: true
  cross_norm: true
  cross_attn_type: flash
  class_dropout_prob: 0.1
  chunk_size: 3
  chunk_split_strategy: first_chunk_plus_one
  cam_attn_compress: 1
  init_cam_from_base: true
  use_delta_actions: false
  use_delta_pose_additive: false
  use_chunk_plucker_post_attn: true
  chunk_plucker_channels: 48
  chunk_plucker_post_attn_blocks: 20
  use_autograd_kernel: true
vae:
  vae_type: LTX2VAE_diffusers
  vae_pretrained: Efficient-Large-Model/SANA-WM_bidirectional
  weight_dtype: bfloat16
  vae_latent_dim: 128
  vae_downsample_rate: 32
  vae_stride: [8, 32, 32]
  if_cache: false
  use_framewise_encoding: true
  use_framewise_decoding: true
  tile_sample_stride_num_frames: 64
  tile_sample_min_num_frames: 96
text_encoder:
  text_encoder_name: gemma-2-2b-it
  caption_channels: 2304
  y_norm: true
  y_norm_scale_factor: 0.01
  model_max_length: 300
  chi_prompt:
    - 'Given a user prompt, generate an "Enhanced prompt" that provides detailed visual descriptions suitable for image generation. Evaluate the level of detail in the user prompt:'
    - '- If the prompt is simple, focus on adding specifics about colors, shapes, sizes, textures, and spatial relationships to create vivid and concrete scenes.'
    - '- If the prompt is already detailed, refine and enhance the existing details slightly without overcomplicating.'
    - 'Here are examples of how to transform or refine prompts:'
    - '- User Prompt: A cat sleeping -> Enhanced: A small, fluffy white cat curled up in a round shape, sleeping peacefully on a warm sunny windowsill, surrounded by pots of blooming red flowers.'
    - '- User Prompt: A busy city street -> Enhanced: A bustling city street scene at dusk, featuring glowing street lamps, a diverse crowd of people in colorful clothing, and a double-decker bus passing by towering glass skyscrapers.'
    - 'Please generate only the enhanced description for the prompt below and avoid including any additional commentary or evaluations:'
    - 'User Prompt: '
scheduler:
  train_sampling_steps: 1000
  predict_flow_v: true
  noise_schedule: linear_flow
  pred_sigma: false
  learn_sigma: true
  flow_shift: 9.95
  inference_flow_shift: 9.8
  weighting_scheme: logit_normal
  logit_mean: 0.0
  logit_std: 1.0
  vis_sampler: chunk_flow_euler
train:
  use_fsdp: true
  fsdp_version: 2
  cp_size: 2
  num_workers: 12
  seed: 3407
  train_batch_size: 1
  train_batch_size_image: 1
  num_epochs: 500
  max_steps: null
  gradient_accumulation_steps: 1
  grad_checkpointing: true
  gradient_clip: 0.5
  optimizer:
    type: AdamW
    lr: 1.0e-5
    betas: [0.9, 0.999]
    eps: 1.0e-10
    weight_decay: 0.0
  auto_lr: null
  lr_schedule: constant
  lr_schedule_args:
    num_warmup_steps: 0
  log_interval: 10
  save_model_steps: 50
  save_model_epochs: 5
  visualize: false
  deterministic_validation: true
  online_metric: false
  work_dir: output/sana_wm_stage1_sekai_chunk_causal_cp2_fsdp2
  ema_update: false
  timestep_weight: false
  noise_multiplier: 0.0
  ltx_image_condition_prob: 0.9
  chunk_sampling_strategy: incremental
  chunk_mixture_probs:
    same_t: 0.1
    incremental: 0.4
    last_chunk_anchor: 0.4
    teacher_forcing_clean: 0.1
  extra:
    cp:
      scan_backend: triton
      triton_block_fusion: true
      fsdp2:
        reshard_after_forward: false
        limit_all_gathers: false
        backward_prefetch: backward_pre
work_dir: output/sana_wm_stage1_sekai_chunk_causal_cp2_fsdp2
resume_from: null
load_from: null
caching: false
report_to: none
tracker_project_name: sana-wm-stage1
name: sekai_chunk_causal_cp2_fsdp2
loss_report_name: loss
